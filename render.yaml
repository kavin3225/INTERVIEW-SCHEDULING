services:
  - type: web
    name: interview-scheduler
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_SQLITE
        value: "true"
      - key: SQLITE_STORAGE_PATH
        value: /tmp/scheduler.sqlite
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: kavin.admin@gmail.com
      - key: ADMIN_PASSWORD
        value: 123
      - key: ADMIN_NAME
        value: Administrator
